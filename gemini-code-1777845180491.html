<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini API Professional Console</title>
    <style>
        :root {
            --primary-bg: #121212;
            --chat-bg: #1e1e1e;
            --user-bubble: #0a84ff;
            --ai-bubble: #2c2c2e;
            --error-red: #ff453a;
            --text-color: #ffffff;
            --accent: #bf5af2;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 修正点：詳細なステータス表示付きヘッダー */
        header {
            padding: 15px;
            background: #2c2c2e;
            border-bottom: 1px solid #3a3a3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #30d158;
            display: inline-block;
            margin-right: 5px;
        }

        /* 修正点：APIキー入力とモデル選択をより本格的に */
        #settings-bar {
            background: #1e1e1e;
            padding: 10px;
            border-bottom: 1px solid #3a3a3c;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        input[type="password"], select {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
        }

        /* チャットエリア */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--ai-bubble); border-bottom-left-radius: 4px; }

        /* 追加点：エラー表示専用スタイル */
        .error-card {
            align-self: center;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            width: 95%;
            font-family: 'Courier New', Courier, monospace;
            margin: 10px 0;
        }

        .error-title { font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid var(--error-red); padding-bottom: 3px; }

        /* 追加点：タイピングインジケーター */
        .typing { font-size: 12px; color: #8e8e93; margin-left: 10px; display: none; }

        /* 入力セクション */
        .input-container {
            padding: 15px;
            background: #1e1e1e;
            border-top: 1px solid #3a3a3c;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px 15px;
            border-radius: 24px;
            font-size: 16px;
            max-height: 150px;
            resize: none;
            outline: none;
        }

        #send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* モバイル対応：キーボード回避のための調整 */
        @media (max-width: 600px) {
            .bubble { max-width: 90%; }
            #settings-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span>Gemini Pro Console</span>
        <div id="connection-status"><span class="status-dot"></span>Ready</div>
    </header>

    <div id="settings-bar">
        <input type="password" id="api-key" placeholder="Gemini API Keyを入力..." autocomplete="current-password">
        <select id="model-select">
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (高性能)</option>
            <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash (高速)</option>
        </select>
    </div>

    <div id="chat-log">
        <div class="bubble ai">システムが起動しました。APIキーを設定してメッセージを送信してください。</div>
    </div>

    <div id="typing-indicator" class="typing">Geminiが応答を生成中...</div>

    <div class="input-container">
        <textarea id="message-input" rows="1" placeholder="メッセージを入力..." oninput="autoHeight(this)"></textarea>
        <button id="send-btn" title="送信">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script type="module">
    // モジュールインポート (SDKの追加点)
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const chatLog = document.getElementById('chat-log');
    const msgInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyField = document.getElementById('api-key');
    const modelSelect = document.getElementById('model-select');
    const typingIndicator = document.getElementById('typing-indicator');

    let history = []; // 変更点：会話履歴の管理を追加

    // 修正点：テキストエリアの自動伸縮
    window.autoHeight = (el) => {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
    };

    // 追加点：エラー詳細表示関数
    function appendError(err) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-card';
        errorDiv.innerHTML = `
            <div class="error-title">⚠️ API Error / Network Error</div>
            <div><strong>Message:</strong> ${err.message || '不明なエラー'}</div>
            ${err.stack ? `<div style="margin-top:5px; font-size:10px; opacity:0.7;"><strong>Stack:</strong> ${err.stack.split('\n')[0]}</div>` : ''}
            <div style="margin-top:5px; font-size:11px; background: #000; padding: 5px;">
                ヒント: APIキーが正しいか、クォータ制限に達していないか、またはインターネット接続を確認してください。
            </div>
        `;
        chatLog.appendChild(errorDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // メッセージ追加
    function appendBubble(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        const key = apiKeyField.value.trim();

        if (!text) return;
        if (!key) {
            appendError({ message: "APIキーが入力されていません。Google AI Studioでキーを取得してください。" });
            return;
        }

        // UI更新
        appendBubble('user', text);
        msgInput.value = '';
        msgInput.style.height = 'auto';
        sendBtn.disabled = true;
        typingIndicator.style.display = 'block';

        try {
            // 変更点：SDKの初期化プロセス
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: modelSelect.value });

            // 変更点：ストリーミングによる逐次表示
            const result = await model.generateContentStream({
                contents: [...history, { role: "user", parts: [{ text: text }] }]
            });

            let fullResponse = "";
            const aiBubble = appendBubble('ai', "...");
            
            for await (const chunk of result.stream) {
                const chunkText = chunk.text();
                fullResponse += chunkText;
                aiBubble.innerText = fullResponse; // リアルタイム更新
                chatLog.scrollTop = chatLog.scrollHeight;
            }

            // 履歴に追加
            history.push({ role: "user", parts: [{ text: text }] });
            history.push({ role: "model", parts: [{ text: fullResponse }] });

        } catch (error) {
            console.error("Gemini API Error:", error);
            appendError(error);
        } finally {
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
        }
    }

    // イベントリスナー
    sendBtn.addEventListener('click', sendMessage);

    // PC用: Shift+Enterで改行、Enterで送信
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
            e.preventDefault();
            sendMessage();
        }
    });

    // モバイルの高さ調整（100vh問題の対策）
    const setViewHeight = () => {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', setViewHeight);
    setViewHeight();
</script>

</body>
</html>
